<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes Vault</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #121212;
            color: white;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 500px;
            padding: 15px;
            font-size: 16px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
        }

        .status {
            margin-top: 10px;
            color: #90ee90;
        }
    </style>
</head>
<body>

    <h1>📚 My Cheat Notes</h1>

    <textarea id="notes" placeholder="Write your notes here..."></textarea>

    <br>
    <button onclick="saveNotes()">Save Notes</button>

    <div class="status" id="status"></div>

    <script>
        const notesArea = document.getElementById("notes");
        const status = document.getElementById("status");

        notesArea.value = localStorage.getItem("cheatNotes") || "";

        function saveNotes() {
            localStorage.setItem("cheatNotes", notesArea.value);
            status.textContent = "Notes saved!";
            setTimeout(() => status.textContent = "", 2000);
        }
    </script>

</body>
</html>
